name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install -f

      - name: Build application
        run: npm run build

      - name: Upload project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true
          strip_components: 0
          source: >-
            package.json,
            package-lock.json,
            ecosystem.config.js,
            dist

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          script: |
            set -e
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi
            if [ -f "$HOME/.profile" ]; then
              . "$HOME/.profile"
            fi
            if [ -f "$HOME/.bashrc" ]; then
              . "$HOME/.bashrc"
            fi
            command -v node >/dev/null 2>&1 || { echo "node is not available on PATH"; exit 1; }
            command -v npm >/dev/null 2>&1 || { echo "npm is not available on PATH"; exit 1; }
            cd "${{ secrets.DEPLOY_PATH }}"
            test -f .env || { echo ".env not found in ${{ secrets.DEPLOY_PATH }}"; exit 1; }
            npm install -f
            npm run migration:run:prod
            npx pm2 startOrReload ecosystem.config.js --update-env
            npx pm2 save
