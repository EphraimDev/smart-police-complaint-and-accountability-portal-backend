version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: spcap-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3006}:3006"
    env_file:
      - .env
    networks:
      - spcap-net
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
volumes:
  uploads:
  logs:

networks:
  spcap-net:
    driver: bridge
